            --template-body file://cloudformation/kt1/account1-je/log.yml \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --change-set-type $CHANGE_SET_TYPE \
            --capabilities CAPABILITY_NAMED_IAM
          aws cloudformation wait change-set-create-complete \
            --stack-name kt1-account1-je-log \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset || true

      - name: Post ChangeSet Summary to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(aws cloudformation describe-change-set \
            --stack-name kt1-account1-je-log \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --query 'Changes' --output text)
          if [ "$CHANGES" == "None" ] || [ -z "$CHANGES" ]; then
            echo "### CloudFormation ChangeSet (Log)\nAWSリソースに変更はありません。" > pr_comment.md
          else
            SUMMARY=$(aws cloudformation describe-change-set \
              --stack-name kt1-account1-je-log \
              --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
              --query 'Changes[*].ResourceChange.{Action:Action, LogicalID:LogicalResourceId, ResourceType:ResourceType, Replacement:Replacement}' \
              --output table)
            echo -e "### CloudFormation ChangeSet (Log)\n\`\`\`text\n$SUMMARY\n\`\`\`" > pr_comment.md
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.md
          aws cloudformation delete-change-set \
            --stack-name kt1-account1-je-log \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset

      - name: Deploy to AWS
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/kt1/account1-je/log.yml \
            --stack-name kt1-account1-je-log \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  # App
  deploy-account1-app:
    name: Deploy App
    needs: deploy-account1-log # ★Logが終わるまで待つ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
