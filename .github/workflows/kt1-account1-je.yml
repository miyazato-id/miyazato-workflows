name: kt1-account1-je-infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudformation/kt1/account1-je/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'cloudformation/kt1/account1-je/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Network
  deploy-account1-network:
    name: Deploy Network
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::473427586283:role/cicd-test-role
          aws-region: ap-northeast-1

      - name: Create ChangeSet (PR Only)
        if: github.event_name == 'pull_request'
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name kt1-account1-je-network --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" == "NOT_FOUND" ] || [ "$STATUS" == "REVIEW_IN_PROGRESS" ] || [ "$STATUS" == "DELETE_COMPLETE" ]; then
            CHANGE_SET_TYPE="CREATE"
          else
            CHANGE_SET_TYPE="UPDATE"
          fi
          aws cloudformation create-change-set \
            --stack-name kt1-account1-je-network \
            --template-body file://cloudformation/kt1/account1-je/network.yml \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --change-set-type $CHANGE_SET_TYPE \
            --capabilities CAPABILITY_NAMED_IAM
          aws cloudformation wait change-set-create-complete \
            --stack-name kt1-account1-je-network \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset || true

      - name: Post ChangeSet Summary to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(aws cloudformation describe-change-set \
            --stack-name kt1-account1-je-network \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --query 'Changes' --output text)
          if [ "$CHANGES" == "None" ] || [ -z "$CHANGES" ]; then
            echo "### CloudFormation ChangeSet (Network)\nAWSリソースに変更はありません。" > pr_comment.md
          else
            SUMMARY=$(aws cloudformation describe-change-set \
              --stack-name kt1-account1-je-network \
              --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
              --query 'Changes[*].ResourceChange.{Action:Action, LogicalID:LogicalResourceId, ResourceType:ResourceType, Replacement:Replacement}' \
              --output table)
            echo -e "### CloudFormation ChangeSet (Network)\n\`\`\`text\n$SUMMARY\n\`\`\`" > pr_comment.md
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.md
          aws cloudformation delete-change-set \
            --stack-name kt1-account1-je-network \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset

      - name: Deploy to AWS
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/kt1/account1-je/network.yml \
            --stack-name kt1-account1-je-network \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  # Security
  deploy-account1-security:
    name: Deploy Security
    needs: deploy-account1-network # ★Networkが終わるまで待つ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::473427586283:role/cicd-test-role
          aws-region: ap-northeast-1

      - name: Create ChangeSet (PR Only)
        if: github.event_name == 'pull_request'
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name kt1-account1-je-security --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" == "NOT_FOUND" ] || [ "$STATUS" == "REVIEW_IN_PROGRESS" ] || [ "$STATUS" == "DELETE_COMPLETE" ]; then
            CHANGE_SET_TYPE="CREATE"
          else
            CHANGE_SET_TYPE="UPDATE"
          fi
          aws cloudformation create-change-set \
            --stack-name kt1-account1-je-security \
            --template-body file://cloudformation/kt1/account1-je/security.yml \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --change-set-type $CHANGE_SET_TYPE \
            --capabilities CAPABILITY_NAMED_IAM
          aws cloudformation wait change-set-create-complete \
            --stack-name kt1-account1-je-security \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset || true

      - name: Post ChangeSet Summary to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(aws cloudformation describe-change-set \
            --stack-name kt1-account1-je-security \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
            --query 'Changes' --output text)
          if [ "$CHANGES" == "None" ] || [ -z "$CHANGES" ]; then
            echo "### CloudFormation ChangeSet (Security)\nAWSリソースに変更はありません。" > pr_comment.md
          else
            SUMMARY=$(aws cloudformation describe-change-set \
              --stack-name kt1-account1-je-security \
              --change-set-name pr-${{ github.event.pull_request.number }}-changeset \
              --query 'Changes[*].ResourceChange.{Action:Action, LogicalID:LogicalResourceId, ResourceType:ResourceType, Replacement:Replacement}' \
              --output table)
            echo -e "### CloudFormation ChangeSet (Security)\n\`\`\`text\n$SUMMARY\n\`\`\`" > pr_comment.md
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.md
          aws cloudformation delete-change-set \
            --stack-name kt1-account1-je-security \
            --change-set-name pr-${{ github.event.pull_request.number }}-changeset

      - name: Deploy to AWS
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/kt1/account1-je/security.yml \
            --stack-name kt1-account1-je-security \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  # Log
  deploy-account1-log:
    name: Deploy Log
    needs: deploy-account1-security # ★Securityが終わるまで待つ
    runs-on: ubuntu-latest
