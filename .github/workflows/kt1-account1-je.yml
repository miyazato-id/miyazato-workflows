          if [ "$STATUS" == "NOT_FOUND" ] || [ "$STATUS" == "REVIEW_IN_PROGRESS" ] || [ "$STATUS" == "DELETE_COMPLETE" ]; then
            CHANGE_SET_TYPE="CREATE"
          else
            CHANGE_SET_TYPE="UPDATE"
          fi
          aws cloudformation create-change-set \
