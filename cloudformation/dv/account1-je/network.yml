# cloudformation/dv/account1-je/network.yml
AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC and Subnet setup for Account1 - dv environment'

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: new-vesta-dv-account1-vpc
        - Key: Environment
          Value: dv

  # -------------------------------------------------------------------
