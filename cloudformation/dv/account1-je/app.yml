AWSTemplateFormatVersion: '2010-09-09'
Description: 'dv-account1-app-stack'

Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: dv-account1-cluster

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: dv-account1-nginx-task
      RequiresCompatibilities: [ FARGATE ]
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !ImportValue "dv-EcsTaskExecutionRoleArn"
      ContainerDefinitions:
        - Name: nginx-container
          # Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/dv-nginx:latest"
          Image: "public.ecr.aws/nginx/nginx:latest"
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !ImportValue "dv-EcsLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: dv-account1-nginx-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue "dv-PrivateSubnet1aId"
          SecurityGroups:
            - !ImportValue "dv-EcsSecurityGroupId"