AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/miyazato-kt1-account1-nginx
      RetentionInDays: 7

Outputs:
  EcsmonitorGroupName:
    Value: !Ref EcsLogGroup
    Export:
      Name: "miyazato-kt1-EcsLogGroupName"