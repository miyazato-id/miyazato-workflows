AWSTemplateFormatVersion: '2010-09-09'
Description: Subnets / RouteTables stack
Parameters:

  Vpc1Id:
    Type: AWS::EC2::VPC::Id
    Default: vpc-07a5c452e710a7990
    Description: Existing VPC1 ID

  Vpc2Id:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0ee8cd72b6acd4a4f
    Description: Existing VPC2 ID



Resources:

##############################################
# ===== VPC1 1NLB =====
##############################################

  Subnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc1Id
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Sub ${AWS::Region}a
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1a-001

  RT1a:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc1Id
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1a-001-rtb001

  Assoc1a:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1a
      RouteTableId: !Ref RT1a

  Subnet1c:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc1Id
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Sub ${AWS::Region}c
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1c-001

  RT1c:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc1Id
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1c-001-rtb001

  Assoc1c:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1c
      RouteTableId: !Ref RT1c

  Subnet1d:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc1Id
      CidrBlock: 10.0.21.0/24
      AvailabilityZone: !Sub ${AWS::Region}d
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1d-001

  RT1d:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc1Id
      Tags:
        - Key: Name
          Value: subnet-jeA0S9V101pr1d-001-rtb001

  Assoc1d:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1d
      RouteTableId: !Ref RT1d

