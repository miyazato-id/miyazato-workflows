AWSTemplateFormatVersion: '2010-09-09'

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: kt1-vpc

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: kt1-private-rt

  PrivateSubnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: ap-northeast-1a
      Tags:
        - Key: Name
          Value: kt1-private-subnet-1a

  PrivateSubnet1aRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1a
      RouteTableId: !Ref PrivateRouteTable

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: kt1-ecs-sg
      GroupDescription: Security Group for ECS Task
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: kt1-ecs-sg

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: kt1-vpce-sg
      GroupDescription: Security Group for VPC Endpoints
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      Tags:
        - Key: Name
          Value: kt1-vpce-sg

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [ !Ref PrivateSubnet1a ]
      SecurityGroupIds: [ !Ref VpcEndpointSecurityGroup ]
      Tags:
        - Key: Name
          Value: kt1-vpce-ecr-dkr

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [ !Ref PrivateSubnet1a ]
      SecurityGroupIds: [ !Ref VpcEndpointSecurityGroup ]
      Tags:
        - Key: Name
          Value: kt1-vpce-ecr-api

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [ !Ref PrivateSubnet1a ]
      SecurityGroupIds: [ !Ref VpcEndpointSecurityGroup ]
      Tags:
        - Key: Name
          Value: kt1-vpce-logs

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds: [ !Ref PrivateRouteTable ]
      Tags:
        - Key: Name
          Value: kt1-vpce-s3

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: "kt1-VpcId"
  PrivateSubnet1aId:
    Value: !Ref PrivateSubnet1a
    Export:
      Name: "kt1-PrivateSubnet1aId"
  EcsSecurityGroupId:
    Value: !Ref EcsSecurityGroup
    Export:
      Name: "kt1-EcsSecurityGroupId"