AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/kt1-account1-nginx
      RetentionInDays: 7

  GitHubActionsLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'github-actions-logs-${AWS::AccountId}-${AWS::Region}'
      
      ObjectLockEnabled: true
      VersioningConfiguration:
        Status: Enabled
        
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 30
            
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
        
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
              
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogsAndVersionsRule
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
              
      Tags:
        - Key: Name
          Value: GitHubActions-Execution-Logs
        - Key: Environment
          Value: kt1

Outputs:
  EcsmonitorGroupName:
    Value: !Ref EcsLogGroup
    Export:
      Name: "kt1-EcsLogGroupName"

  # ==========================================
  # 追加：作成されたS3バケット名の出力（他テンプレートからの参照用）
  # ==========================================
  GitHubActionsLogBucketName:
    Description: "The name of the S3 bucket for GitHub Actions logs"
    Value: !Ref GitHubActionsLogBucket
    Export:
      Name: "kt1-GitHubActionsLogBucketName"