AWSTemplateFormatVersion: '2010-09-09'

Resources:

  AppEcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: miyazato-kt1-nginx

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: miyazato-kt1-account1-cluster

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: miyazato-kt1-account1-nginx-task
      RequiresCompatibilities: [ FARGATE ]
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !ImportValue "miyazato-kt1-EcsTaskExecutionRoleArn"
      ContainerDefinitions:
        - Name: nginx-container
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/miyazato-kt1-nginx:v8"
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/miyazato-kt1-account1-nginx-v2
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: miyazato-kt1-account1-nginx-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue "miyazato-kt1-PrivateSubnet1aId"
          SecurityGroups:
            - !ImportValue "miyazato-kt1-EcsSecurityGroupId"